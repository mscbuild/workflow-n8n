# .github/release.yml
 name-template: "n8n-workflows v$NEXT_PATCH_VERSION"
 tag-template: "v$NEXT_PATCH_VERSION"

 categories:
  - title: 🚀 New Workflows
    labels:
      - workflow
      - new-workflow

  - title: 🔄 Workflow Updates
    labels:
      - workflow-update
      - enhancement

  - title: ⚡ Performance Improvements
    labels:
      - performance
      - optimization

  - title: 🐛 Bug Fixes
    labels:
      - bug
      - fix

  - title: 🔌 Node Changes
    labels:
      - node
      - node-update

  - title: 🔗 Integrations
    labels:
      - integration
      - api

  - title: 🔐 Security
    labels:
      - security

  - title: 📚 Documentation
    labels:
      - documentation
      - docs

  - title: ⚙️ CI/CD
    labels:
      - ci
      - build

  - title: 🧹 Maintenance
    labels:
      - chore
      - cleanup

 change-template: "- $TITLE (#$NUMBER)"

 template: |
  ## 🧠 n8n Workflow Release

  This release includes updates to workflows, nodes, and automation logic.

  ---

  ## 🚀 Highlights
  $CHANGES

  ---

  ## 📥 How to Use

  1. Import workflows into your n8n instance
  2. Configure credentials (API keys, OAuth, etc.)
  3. Activate workflows

  ---

  ## ⚠️ Notes
  - Review credential requirements before enabling workflows
  - Test in a staging environment when possible

  ---

  ## 🔗 Full Changelog
  $COMPARE_URL

 exclude:
  labels:
    - skip-changelog
    - duplicate
    - invalid
    - wontfix
 version-resolver:
 major:
    labels:
      - breaking-change
      - workflow-breaking
 minor:
    labels:
      - new-workflow
      - integration
      - node
 patch:
    labels:
      - workflow-update
      - bug
      - fix
      - performance
      - chore
  default: patch
    
